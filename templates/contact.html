<!doctype html>
<html lang="en">
  <head>
    <title>Contact</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sarah Chang — Contact" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/styles.css" />
  </head>
  <body class="bg-white-page">
    <div data-include="/templates/partials/_navbar.html"></div>
    <main class="site-content">
      <section class="container py-5">
        <div class="row">
          <div class="col-12">
            <h1
              class="mb-5 home-hero-title"
              style="font-size: 400%; font-weight: bold"
            >
              Let's flow together!
            </h1>
            <p class="mb-3" style="font-size: 162%; margin-right: 5%">
              My heart is to bring yoga into the community through local
              partnerships. If you'd like to host a class at your business, I’d
              love to work together.
            </p>
          </div>
        </div>
      </section>
      <section class="container pb-5">
        <div class="row">
          <div class="col-12 col-lg-7 mx-auto">
            <form action="https://formspree.io/f/mqegpvkd" method="POST">
              <div class="mb-4">
                <label for="subject" style="font-size: 120%; font-weight: bold"
                  >SUBJECT</label
                >
                <input
                  type="text"
                  id="subject"
                  name="subject"
                  class="form-control mt-1"
                  placeholder="What is this about?"
                  required
                  style="border-radius: 0; padding: 0.75rem"
                />
              </div>

              <div class="row">
                <div class="col-12 col-md-6 mb-4">
                  <label for="name" style="font-size: 120%; font-weight: bold"
                    >NAME</label
                  >
                  <input
                    type="text"
                    id="name"
                    name="name"
                    class="form-control mt-1"
                    placeholder="Your name"
                    required
                    style="border-radius: 0; padding: 0.75rem"
                  />
                </div>
                <div class="col-12 col-md-6 mb-4">
                  <label for="phone" style="font-size: 120%; font-weight: bold"
                    >PHONE NUMBER</label
                  >
                  <input
                    type="tel"
                    id="phone"
                    name="phone"
                    class="form-control mt-1"
                    placeholder="(123) 456-7890"
                    style="border-radius: 0; padding: 0.75rem"
                  />
                </div>
              </div>

              <div class="mb-4">
                <label for="email" style="font-size: 120%; font-weight: bold"
                  >EMAIL</label
                >
                <input
                  type="email"
                  id="email"
                  name="email"
                  class="form-control mt-1"
                  placeholder="your@email.com"
                  required
                  style="border-radius: 0; padding: 0.75rem"
                />
              </div>

              <div class="mb-4">
                <label for="message" style="font-size: 120%; font-weight: bold"
                  >MESSAGE</label
                >
                <textarea
                  id="message"
                  name="message"
                  class="form-control mt-1"
                  rows="6"
                  placeholder="Your message..."
                  maxlength="1200"
                  required
                  style="border-radius: 0; padding: 0.75rem"
                ></textarea>
                <small class="form-text text-muted"
                  >Maximum 200 words (~1200 characters)</small
                >
              </div>

              <div class="text-center">
                <button
                  type="submit"
                  class="btn cta-hover-btn"
                  style="padding: 20px 80px; font-size: 20px; font-weight: bold"
                >
                  SUBMIT
                </button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </main>
    <div data-include="/templates/partials/_footer.html"></div>
    <script src="../js/navbar.js"></script>
  </body>
</html>
